name: Secretary Kim CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-format:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Verify uv lock file is in sync
        run: uv lock --check

      - name: Lint with Ruff
        run: uvx ruff check .

      - name: Check formatting with Ruff
        run: uvx ruff format --check .
